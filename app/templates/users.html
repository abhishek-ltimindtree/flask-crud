{% extends "base.html" %}

{% block content %}

<div class="d-flex justify-content-between mb-3">

<h2>Users</h2>

<a href="/create" class="btn btn-primary">Add User</a>

</div>

<table class="table table-bordered">

<thead class="table-dark">

<tr>

<th>ID</th>

<th>Name</th>

<th>Email</th>

<th>Action</th>

</tr>

</thead>

<tbody>

{% for user in users %}

<tr>

<td>{{ user.id }}</td>

<td>{{ user.name }}</td>

<td>{{ user.email }}</td>

<td>

<a href="/edit/{{user.id}}" class="btn btn-warning btn-sm">Edit</a>

<a href="/delete/{{user.id}}" class="btn btn-danger btn-sm">Delete</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

{% endblock %}
